    .c-blue   { color: #2563eb; }
    .c-green  { color: #059669; }

    .alert-title { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 6px; }

    .cal-dow.sat { color: #3b82f6; }

    .cal-cell.ms { background: linear-gradient(135deg,#b8e6b8,#90d490); color: #1e5631; }

    .seg-btns { display: flex; gap: 8px; }
    .seg-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #e5e7eb; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }

    .seg-btn.active-ms       { border-color: #90d490; background: #d4f1d4; color: #1e5631; }
    .seg-btn.active-handover { border-color: #fbbf24; background: #fffbeb; color: #92400e; }
    .seg-btn.active-work     { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .seg-btn.active-holiday  { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    .seg-btn.active-no       { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; }
    .modal-select { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .modal-select:focus { border-color: #7c3aed; }
    .modal-input { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }

    .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
    .modal-save { flex: 1; padding: 11px; background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .modal-cancel { flex: 1; padding: 11px; background: #f3f4f6; color: #6b7280; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .modal-delete { width: 100%; padding: 10px; background: #fee2e2; color: #ef4444; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }

    .fair-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .fair-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 16px; }
    .fair-row { margin-bottom: 16px; }
    .fair-row-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .fair-row-label { color: #6b7280; }
    .fair-ok  { color: #059669; font-weight: 600; }

    .loading-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }

    .wish-day-label { font-size: 9px; color: #9ca3af; }
    .wish-day-num { font-size: 13px; font-weight: 600; }
    .wish-summary { background: #d1fae5; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
    .wish-summary-text { font-size: 13px; font-weight: 600; color: #065f46; }
    .wish-summary-sub { font-size: 11px; color: #059669; margin-top: 2px; }

    @media(max-width:480px){

      .cell-date { font-size: 11px; }
      .cell-worker { font-size: 10px; }
      .cell-handover,.cell-holiday { font-size: 9px; }
    }
    /* ── 모바일 달력 글씨 줄바꿈 방지 (3번 항목) ── */
    @media(max-width:640px){
      .cal-cell { min-height: 56px; padding: 2px; }
      .cell-date { font-size: 10px; }
      .cell-worker { font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .cell-handover,.cell-holiday { font-size: 8px; white-space: nowrap; padding: 1px 2px; }
      .cell-edit-hint { display: none; }

    /* ── 희망일 달력 셀 (5번 항목) ── */
    .cal-cell.wish-selected { background: linear-gradient(135deg,#a7f3d0,#6ee7b7); color: #065f46; border: 2px solid #059669 !important; }

    /* ── 날씨 슬라이더 (2번 항목) ── */
    .weather-slider-wrap { margin: 14px 0; }
    .weather-slider-wrap input[type=range] { width: 100%; accent-color: #7c3aed; }
    .weather-hour-info { background: #f0f9ff; border-radius: 10px; padding: 14px 16px; margin-top: 10px; display: flex; align-items: center; gap: 14px; }
    .weather-hour-icon { font-size: 36px; line-height: 1; }
    .weather-hour-desc { font-size: 17px; font-weight: 700; color: #1f2937; }
    .weather-hour-sub { font-size: 13px; color: #6b7280; margin-top: 4px; }

    /* ── 주말 체크리스트 (6번 항목) ── */
    .checklist-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f3f4f6; }

  </style>
</head>

    const p = [...pin]; p[i] = v; setPin(p);
    if (v && i < 3) document.getElementById(`p${i+1}`)?.focus();
    if (i === 3 && v) verify([...p.slice(0,3), v]);
  };

  const verify = async (p) => {
    const entered = p.join('');
    const { data } = await supabase.from('users').select('pin,is_first_login,is_admin').eq('username', user).single();
    if (!data) { setErr('사용자 정보 없음'); setPin(['','','','']); return; }
    if (data.pin !== entered) { setErr('PIN이 틀렸습니다'); setPin(['','','','']); document.getElementById('p0')?.focus(); return; }
    onLogin(user, data.is_first_login, data.is_admin || false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-icon">🏝️</div>
        <h1 className="login-title">주문도 교대관리</h1>
        <p className="login-sub">v2.1 · 실시간 동기화</p>

        <div className="user-grid">
          {['효중','민수'].map(u => (
            <button key={u} className={`user-btn ${user===u ? (u==='효중'?'sel-a':'sel-b') : ''}`} onClick={()=>{ setUser(u); setPin(['','','','']); setErr(''); }}>
              <div className="u-icon">{u==='효중'?'👨':'👨‍💼'}</div>
              <div className="u-name">{u}</div>
            </button>
          ))}
        </div>

        <p className="pin-label">PIN 입력</p>
        <div className="pin-row">
          {pin.map((d,i) => (
            <input key={i} id={`p${i}`} type="password" maxLength={1} value={d}
              className="pin-box" autoFocus={i===0}
              onChange={e => handlePin(i, e.target.value)} />
          ))}
        </div>
        <p className="pin-err">{err}</p>
        <p className="pin-hint">초기 PIN: 0000</p>
      </div>
    </div>
  );
}

  const totalDays = daysInMonth(year, month);

  return (

// 항차별 섬 도착 기준 분 수
const FERRY_MINS = { '1항차': 505, '2항차': 835, '3항차': 1045 };
const arrivalMins = ht => FERRY_MINS[ht?.split(' ')[0]] ?? 505;
const fmtMins = m => { const h = Math.floor(m/60), r = m%60; return r > 0 ? `${h}시간 ${String(r).padStart(2,'0')}분` : `${h}시간`; };

function StatsCards({ scheduleMap, year, month }) {
  const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthKeys = Object.keys(scheduleMap).filter(k => k.startsWith(prefix));

  let hjDays=0, msDays=0, hjMins=0, msMins=0;
  monthKeys.forEach(k => {
    const sc = scheduleMap[k];
    if (sc.is_handover) {
      const am = arrivalMins(sc.handover_time);
      if (sc.worker === '효중') { hjDays++; hjMins += 1440-am; msMins += am; }
      else                      { msDays++; msMins += 1440-am; hjMins += am; }
    } else {
      if (sc.worker === '효중') { hjDays++; hjMins += 1440; }
      else                      { msDays++; msMins += 1440; }
    }
  });

  const total = daysInMonth(year, month);
  const nextHandover = Object.entries(scheduleMap)
    .filter(([k,v]) => k >= today() && v.is_handover)
    .sort(([a],[b]) => a.localeCompare(b))[0];
  const [,nm,nd] = nextHandover ? nextHandover[0].split('-') : [];
  const nextLabel = nextHandover ? `${parseInt(nm)}/${parseInt(nd)} ${nextHandover[1].handover_time?.split(' ')[0]}` : '-';

  return (
    <div className="stats-grid">
      <div className="stat-card">
        <div className="stat-label">근무일수 ({month+1}월)</div>
        <div style={{marginTop:6}}>
          <div style={{fontSize:16,fontWeight:700,color:'#1a5276'}}>효중 {hjDays}일</div>
          <div style={{fontSize:16,fontWeight:700,color:'#1e5631',marginTop:3}}>민수 {msDays}일</div>
        </div>
      </div>
      <div className="stat-card">
        <div className="stat-label">실근무시간</div>
        <div style={{marginTop:6}}>
          <div style={{fontSize:13,fontWeight:700,color:'#1a5276'}}>효중 {fmtMins(hjMins)}</div>
          <div style={{fontSize:13,fontWeight:700,color:'#1e5631',marginTop:3}}>민수 {fmtMins(msMins)}</div>
        </div>
      </div>
      <div className="stat-card">
        <div className="stat-label">휴식일수</div>
        <div style={{marginTop:6}}>
          <div style={{fontSize:16,fontWeight:700,color:'#1a5276'}}>효중 {total-hjDays}일</div>
          <div style={{fontSize:16,fontWeight:700,color:'#1e5631',marginTop:3}}>민수 {total-msDays}일</div>
        </div>
      </div>
      <div className="stat-card">
        <div className="stat-label">다음 교대</div>
        <div className="stat-val c-orange" style={{fontSize:16}}>{nextLabel}</div>
      </div>
    </div>
  );
}

function HandoverAlert({ scheduleMap, currentUser }) {
  const todayKey = today();
  const [ty, tm, td] = todayKey.split('-').map(Number);
  const tomorrowKey = toKey(ty, tm-1, td+1);
  const tmSc = scheduleMap[tomorrowKey];
  const todSc = scheduleMap[todayKey];

// ── 공정성 ──
function FairnessReport({ scheduleMap }) {
  const all = Object.values(scheduleMap);
  const hjDays = all.filter(s=>s.worker==='효중').length;
  const msDays = all.filter(s=>s.worker==='민수').length;
  const total = hjDays + msDays || 1;

  const hjWknd = all.filter(s=>{ const dow=new Date(Object.keys(scheduleMap).find(k=>scheduleMap[k]===s)).getDay(); return s.worker==='효중'&&(dow===0||dow===6); }).length;
  const msWknd = all.filter(s=>{ const dow=new Date(Object.keys(scheduleMap).find(k=>scheduleMap[k]===s)).getDay(); return s.worker==='민수'&&(dow===0||dow===6); }).length;

  const diff = Math.abs(hjDays-msDays);
  const wDiff = Math.abs(hjWknd-msWknd);
  const dScore = Math.max(0,(3-diff)/3*40);
  const wScore = Math.max(0,(2-wDiff)/2*30);
  const score = Math.round(dScore+wScore+30);

  return (
    <div className="fair-card">
      <div className="fair-title">⚖️ 누적 공정성 리포트</div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">📈 근무일수 균형</span>
          <span className={diff<=3?'fair-ok':'fair-warn'}>{diff<=3?'✅ 균형':'⚠️ 조정필요'}</span>
        </div>
        {[['효중',hjDays,'bar-hj'],['민수',msDays,'bar-ms']].map(([n,v,cls])=>(
          <div key={n} className="bar-wrap">
            <span className="bar-name">{n}</span>
            <div className="bar-bg">
              <div className={`bar-fill ${cls}`} style={{width:`${(v/Math.max(hjDays,msDays,1))*100}%`}}>{v}일</div>
            </div>
          </div>
        ))}
        <p className="fair-note">차이 {diff}일 (목표: 3일 이내)</p>
      </div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">🌅 주말 근무</span>
          <span className={wDiff<=2?'fair-ok':'fair-warn'}>{wDiff<=2?'✅ 균형':'⚠️ 주의'}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['효중',hjWknd,'#d6eef8','#1a5276'],['민수',msWknd,'#d4f1d4','#1e5631']].map(([n,v,bg,c])=>(
            <div key={n} style={{background:bg,borderRadius:8,padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:12,color:'#6b7280'}}>{n}</div>
              <div style={{fontSize:22,fontWeight:700,color:c}}>{v}일</div>
            </div>
          ))}
        </div>
      </div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">🎯 종합 공정성 점수</span>
        </div>
        <div className="score-wrap">
          <span className="score-num">{score}/100</span>
          <span style={{fontSize:28}}>{score>=90?'🏆':score>=70?'👍':'⚠️'}</span>
        </div>
        <div className="score-bar-bg">
          <div className={`score-bar-fill ${score>=90?'score-excellent':score>=70?'score-good':'score-poor'}`} style={{width:`${score}%`}} />
        </div>
        <p className="score-desc">{score>=90?'✅ 매우 공정':score>=70?'👍 양호':' ⚠️ 다음 달 조정 필요'}</p>
      </div>
    </div>
  );
}

// ── 희망일 (달력 형식, Supabase 저장) (5번 항목) ──
// SQL: CREATE TABLE wish_dates (id bigserial primary key, username text, date text, created_at timestamptz default now(), unique(username, date));
function WishCalendar({ currentUser }) {
  const now = new Date();
  let defYear = now.getFullYear(), defMonth = now.getMonth() + 1;
  if (defMonth > 11) { defMonth = 0; defYear++; }

  const [wYear, setWYear] = useState(defYear);
  const [wMonth, setWMonth] = useState(defMonth);
  const [wishDates, setWishDates] = useState(new Set());
  const todayKey = today();

  useEffect(() => {
    supabase.from('wish_dates').select('date').eq('username', currentUser)
      .then(({ data }) => { if (data) setWishDates(new Set(data.map(r => r.date))); });
  }, [currentUser]);

  const toggleWish = async (dateKey) => {
    const newSet = new Set(wishDates);
    if (newSet.has(dateKey)) {
      newSet.delete(dateKey);
      await supabase.from('wish_dates').delete().eq('username', currentUser).eq('date', dateKey);
    } else {
      newSet.add(dateKey);
      await supabase.from('wish_dates').insert({ username: currentUser, date: dateKey });
    }
    setWishDates(newSet);
  };

  const prevWM = () => { if (wMonth === 0) { setWYear(y=>y-1); setWMonth(11); } else setWMonth(m=>m-1); };
  const nextWM = () => { if (wMonth === 11) { setWYear(y=>y+1); setWMonth(0); } else setWMonth(m=>m+1); };

  const firstDow = new Date(wYear, wMonth, 1).getDay();
  const totalDays = daysInMonth(wYear, wMonth);
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);

  const pfx = `${wYear}-${String(wMonth+1).padStart(2,'0')}`;
  const selectedList = [...wishDates].filter(k => k.startsWith(pfx)).sort();

  return (
    <div className="cal-card">
      <div style={{marginBottom:12}}>
        <h3 style={{fontSize:16,fontWeight:700,color:'#1f2937',marginBottom:4}}>💚 희망 휴무일 선택</h3>
        <p style={{fontSize:13,color:'#6b7280'}}>원하는 휴무일을 달력에서 선택 (Supabase 자동 저장)</p>
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:12}}>
        <button className="cal-nav-btn" onClick={prevWM}>‹</button>
        <span style={{fontSize:16,fontWeight:700,color:'#1f2937',minWidth:80,textAlign:'center'}}>{wYear}년 {wMonth+1}월</span>
        <button className="cal-nav-btn" onClick={nextWM}>›</button>
      </div>

      <div className="cal-grid">
        {DOW.map((d,i) => <div key={d} className={`cal-dow ${i===0?'sun':i===6?'sat':''}`}>{d}</div>)}
        {cells.map((d,i) => {
          if (!d) return <div key={`e${i}`} className="cal-cell empty" />;
          const key = toKey(wYear, wMonth, d);
          const isWish = wishDates.has(key);
          const dow = new Date(wYear, wMonth, d).getDay();
          const isPast = key < todayKey;
          return (
            <div key={key}
              className={`cal-cell ${isWish ? 'wish-selected' : 'unset'}`}
              style={{opacity: isPast ? 0.45 : 1, cursor: isPast ? 'default' : 'pointer'}}
              onClick={() => { if (!isPast) toggleWish(key); }}>
              <div className="cell-date">
                <span style={{color: dow===0?'#ef4444':dow===6?'#93c5fd':''}}>{d}</span>
                {isWish && <span style={{fontSize:10}}>💚</span>}
              </div>
              {isWish && <div style={{fontSize:9,color:'#065f46',fontWeight:700,marginTop:2}}>희망</div>}
            </div>
          );
        })}
      </div>

      {selectedList.length > 0 ? (
        <div style={{marginTop:12,background:'#d1fae5',borderRadius:10,padding:'12px 16px'}}>
          <p style={{fontSize:13,fontWeight:600,color:'#065f46'}}>
            💚 {wMonth+1}월 선택: {selectedList.map(k=>{const[,mm,dd]=k.split('-');return `${parseInt(dd)}일`;}).join(', ')}
          </p>
          <p style={{fontSize:11,color:'#059669',marginTop:2}}>총 {selectedList.length}일</p>
        </div>
      ) : (
        <div style={{marginTop:12,color:'#9ca3af',fontSize:13,textAlign:'center'}}>이번 달 선택된 희망일 없음</div>
      )}
    </div>
  );
}

// ── 통계 탭 (6번 항목: 공정성 리포트 + 주말/공휴일 체크리스트) ──
// SQL: CREATE TABLE weekend_checks (id bigserial primary key, username text, date text, checked boolean default false, created_at timestamptz default now(), unique(username, date));
function StatsTab({ scheduleMap, currentUser }) {
  const [checks, setChecks] = useState({});

  useEffect(() => {
    supabase.from('weekend_checks').select('date,checked').eq('username', currentUser)
      .then(({ data }) => {
        if (data) {
          const m = {};
          data.forEach(r => { m[r.date] = r.checked; });
          setChecks(m);
        }
      });
  }, [currentUser]);

  const workItems = Object.entries(scheduleMap)
    .filter(([k, v]) => {
      if (v.worker !== currentUser) return false;
      const dow = new Date(k + 'T12:00:00').getDay();
      return dow === 0 || dow === 6 || v.is_holiday;
    })
    .sort(([a], [b]) => a.localeCompare(b));

  const toggleCheck = async (dateKey) => {
    const newVal = !checks[dateKey];
    setChecks(c => ({ ...c, [dateKey]: newVal }));
    const { data } = await supabase.from('weekend_checks').select('id').eq('username', currentUser).eq('date', dateKey).maybeSingle();
    if (data) {
      await supabase.from('weekend_checks').update({ checked: newVal }).eq('id', data.id);
    } else {
      await supabase.from('weekend_checks').insert({ username: currentUser, date: dateKey, checked: newVal });
    }
  };

  const calcDaysLeft = (dateKey) => {
    const worked = new Date(dateKey + 'T12:00:00');
    const deadline = new Date(worked);
    deadline.setMonth(deadline.getMonth() + 1);
    return Math.ceil((deadline - new Date()) / 86400000);
  };

  return (
    <>
      <FairnessReport scheduleMap={scheduleMap} />
      <div className="fair-card">
        <div className="fair-title">🗓️ 주말/공휴일 근무 체크리스트</div>
        <p style={{fontSize:12,color:'#6b7280',marginBottom:14}}>{currentUser}님의 근무일 기준 · 근무일로부터 1개월 이내 보상 여부 확인</p>
        {workItems.length === 0 ? (
          <p style={{color:'#9ca3af',fontSize:13,textAlign:'center',padding:'12px 0'}}>주말/공휴일 근무 기록 없음</p>
        ) : workItems.map(([k, v]) => {
          const [,mm,dd] = k.split('-');
          const dow = new Date(k+'T12:00:00').getDay();
          const dLeft = calcDaysLeft(k);
          const checked = checks[k] || false;
          return (
            <div key={k} className="checklist-item">
              <input type="checkbox" checked={checked} onChange={() => toggleCheck(k)} />
              <span style={{flex:1,fontSize:14,color:checked?'#9ca3af':'#1f2937',textDecoration:checked?'line-through':'none'}}>
                {parseInt(mm)}/{parseInt(dd)} ({DOW[dow]}) 근무
                {v.is_holiday && <span style={{fontSize:10,background:'#ef4444',color:'#fff',borderRadius:4,padding:'1px 4px',marginLeft:6}}>{v.holiday_name||'공휴일'}</span>}
                {(dow===0||dow===6) && !v.is_holiday && <span style={{fontSize:10,background:'#3b82f6',color:'#fff',borderRadius:4,padding:'1px 4px',marginLeft:6}}>주말</span>}
              </span>
              {dLeft > 0
                ? <span style={{fontSize:12,color:'#ea580c',fontWeight:700,whiteSpace:'nowrap'}}>D-{dLeft}일</span>
                : <span style={{fontSize:12,color:'#9ca3af',whiteSpace:'nowrap'}}>기간만료</span>}
            </div>
          );
        })}
      </div>
    </>
  );
}

// ── 헤더 공정성 배지 (7번 항목: 균등 분배) ──
function FairnessIndicator({ scheduleMap }) {
  const START = '2026-04-17';
  const END   = '2027-04-16';

  const all = Object.entries(scheduleMap).filter(([k]) => k >= START && k <= END);
  const hjDays = all.filter(([,v]) => v.worker === '효중').length;
  const msDays = all.filter(([,v]) => v.worker === '민수').length;
  const totalDays = hjDays + msDays;
  // 전체 근무일의 절반을 기준일로 (균등 분배)
  const BASE = Math.ceil(totalDays / 2);

  const hjColor = hjDays >= BASE ? '#6ee7b7' : '#fdba74';
  const msColor = msDays >= BASE ? '#6ee7b7' : '#fdba74';

  return (
    <div className="fair-badge">
      <span>⚖️</span>
      <span className="fair-badge-item" style={{color: hjColor}}>효중 {hjDays}/{BASE}일</span>
      <span className="fair-badge-sep">|</span>
      <span className="fair-badge-item" style={{color: msColor}}>민수 {msDays}/{BASE}일</span>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [state, setState] = useState('loading'); // loading | login | changePin | dashboard
  const [currentUser, setCurrentUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [scheduleMap, setScheduleMap] = useState({});
  const [tab, setTab] = useState('calendar');
  const [calYear, setCalYear] = useState(new Date().getFullYear());
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [modal, setModal] = useState(null); // { dateKey, existing }
  const [confirmModal, setConfirmModal] = useState(null); // { dateKey, formData, forwardKeys, backwardKeys, otherWorker }
  const [filling, setFilling] = useState(false);

  // 초기 로드
  useEffect(() => {
    const init = async () => {
      // 테이블 없으면 초기화
      const { error } = await supabase.from('users').select('username').limit(1);
      if (error) { setState('login'); return; }
      setState('login');
    };
    init();
  }, []);

  // 스케줄 로드
  const loadSchedule = useCallback(async () => {
    const { data } = await supabase.from('schedule').select('*');
    if (!data) return;
    const map = {};
    data.forEach(r => { map[r.date] = r; });
    setScheduleMap(map);
  }, []);

  // 실시간 구독
  useEffect(() => {
    if (state !== 'dashboard') return;
    loadSchedule();
    const channel = supabase.channel('schedule-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'schedule' }, () => loadSchedule())
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, [state, loadSchedule]);

  const handleLogin = (user, isFirst, isAdm) => {
    setCurrentUser(user);
    setIsAdmin(isAdm || false);
    if (isFirst) setState('changePin');
    else setState('dashboard');
  };

  const handlePinChanged = () => setState('dashboard');

  // 셀 클릭 (4번 항목: 7일 이전 수정 제한)
  // SQL: ALTER TABLE users ADD COLUMN IF NOT EXISTS is_admin boolean DEFAULT false;
  const handleCellClick = (dateKey, existing) => {
    if (!isAdmin) {
      const sevenDaysAgo = addDays(today(), -7);
      if (dateKey < sevenDaysAgo) {
        alert('⛔ 수정 불가\n오늘로부터 7일 이전 날짜는 수정할 수 없습니다.\n(관리자 계정만 수정 가능)');
        return;
      }
    }
    setModal({ dateKey, existing });
  };

  // 단일 날짜 저장 (내부용)
  const saveSingleDay = async (dateKey, data) => {
    if (scheduleMap[dateKey]) {
      await supabase.from('schedule').update({ ...data, updated_at: new Date().toISOString() }).eq('date', dateKey);
    } else {
      await supabase.from('schedule').insert({ date: dateKey, ...data });
    }
  };

  // 양방향 자동채우기 범위 계산
  const calcAutoFillRange = (dateKey, worker) => {
    const otherWorker = worker === '효중' ? '민수' : '효중';

    // 이후: dateKey+1 ~ 다음 교대일 전날 (없으면 +7일)
    const nextHO = Object.entries(scheduleMap)
      .filter(([k, v]) => k > dateKey && v.is_handover)
      .sort(([a], [b]) => a.localeCompare(b))[0];
    const forwardKeys = [];
    let cur = addDays(dateKey, 1);
    if (nextHO) {
      while (cur < nextHO[0]) { forwardKeys.push(cur); cur = addDays(cur, 1); }
    } else {
      for (let i = 0; i < 7; i++) { forwardKeys.push(cur); cur = addDays(cur, 1); }
    }

    // 이전: 직전 교대일 다음날 ~ dateKey-1 (없으면 -7일)
    const prevHO = Object.entries(scheduleMap)
      .filter(([k, v]) => k < dateKey && v.is_handover)
      .sort(([a], [b]) => b.localeCompare(a))[0];
    const backwardKeys = [];
    const backEnd = addDays(dateKey, -1);
    const backStart = prevHO ? addDays(prevHO[0], 1) : addDays(dateKey, -7);
    let bcur = backStart;
    while (bcur <= backEnd) { backwardKeys.push(bcur); bcur = addDays(bcur, 1); }

    return { forwardKeys, backwardKeys, otherWorker };
  };

  // 저장
  const handleSave = async (dateKey, formData) => {
    if (formData.is_handover && dateKey >= today()) {
      const { forwardKeys, backwardKeys, otherWorker } = calcAutoFillRange(dateKey, formData.worker);
      if (forwardKeys.length + backwardKeys.length > 0) {
        setConfirmModal({ dateKey, formData, forwardKeys, backwardKeys, otherWorker });
        return;
      }
    }
    await saveSingleDay(dateKey, formData);
    setModal(null);
    loadSchedule();
  };

  // 확인 모달: 이 날만
  const handleConfirmSingleOnly = async () => {
    setFilling(true);
    const { dateKey, formData } = confirmModal;
    await saveSingleDay(dateKey, formData);
    setModal(null); setConfirmModal(null); setFilling(false);
    loadSchedule();
  };

  // 확인 모달: 자동 입력 (양방향)
  const handleConfirmAutoFill = async () => {
    setFilling(true);
    const { dateKey, formData, forwardKeys, backwardKeys, otherWorker } = confirmModal;
    await saveSingleDay(dateKey, formData);
    const makeData = (k, w) => {
      const hn = getHolidayName(k);
      return { worker: w, is_handover: false, handover_time: null, is_holiday: !!hn, holiday_name: hn || null };
    };
    await Promise.all([
      ...forwardKeys.map(k => saveSingleDay(k, makeData(k, formData.worker))),
      ...backwardKeys.map(k => saveSingleDay(k, makeData(k, otherWorker))),
    ]);
    setModal(null); setConfirmModal(null); setFilling(false);
    loadSchedule();
  };

  // 삭제
  const handleDelete = async (dateKey) => {
    await supabase.from('schedule').delete().eq('date', dateKey);
    setModal(null);
    loadSchedule();
  };

  // 월 이동
  const prevMonth = () => {
    if (calMonth === 0) { setCalYear(y=>y-1); setCalMonth(11); }
    else setCalMonth(m=>m-1);
  };
  const nextMonth = () => {
    if (calMonth === 11) { setCalYear(y=>y+1); setCalMonth(0); }
    else setCalMonth(m=>m+1);
  };

  if (state === 'loading') return <LoadingScreen />;
  if (state === 'login') return <LoginScreen onLogin={handleLogin} />;
  if (state === 'changePin') return <ChangePinScreen username={currentUser} onDone={handlePinChanged} />;

  return (
    <div>
      {/* 헤더 */}
      <div className="header">
        <div className="header-inner">
          <div>
            <div className="header-title">🏝️ 주문도 교대관리</div>
            <div className="header-user">{currentUser}님</div>
          </div>
          <div className="header-right">
            <FairnessIndicator scheduleMap={scheduleMap} />
            <button className="logout-btn" onClick={()=>{ setCurrentUser(null); setState('login'); }}>로그아웃</button>
          </div>
        </div>
      </div>

      <div className="main">
        {/* 통계 */}
        <StatsCards scheduleMap={scheduleMap} year={calYear} month={calMonth} />

        {/* 교대 알림 */}
        <HandoverAlert scheduleMap={scheduleMap} currentUser={currentUser} />

        {/* 탭 */}
        <div className="tabs">
          {[['calendar','📅 스케줄'],['wish','💚 희망일'],['stats','📊 통계'],['weather','🌊 기상']].map(([k,l])=>(
            <button key={k} className={`tab-btn ${tab===k?'active':'inactive'}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {/* 캘린더 탭 */}
        {tab === 'calendar' && (
          <>
            {/* 월 네비게이션 */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:12}}>
              <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
              <span style={{fontSize:16,fontWeight:700,color:'#1f2937',minWidth:80,textAlign:'center'}}>{calYear}년 {calMonth+1}월</span>
              <button className="cal-nav-btn" onClick={nextMonth}>›</button>
            </div>
            <CalendarView
              scheduleMap={scheduleMap}
              currentUser={currentUser}
              year={calYear}
              month={calMonth}
              onCellClick={handleCellClick}
            />
          </>
        )}

        {tab === 'wish' && <WishCalendar currentUser={currentUser} />}
        {tab === 'stats' && <StatsTab scheduleMap={scheduleMap} currentUser={currentUser} />}
        {tab === 'weather' && <WeatherView />}
      </div>

      {/* 날짜 편집 모달 */}
      {modal && (
        <DayModal
          dateKey={modal.dateKey}
          existing={modal.existing}
          onSave={data => handleSave(modal.dateKey, data)}
          onDelete={() => handleDelete(modal.dateKey)}
          onClose={() => setModal(null)}
        />
      )}

      {/* 자동입력 확인 모달 */}
      {confirmModal && (
        <ConfirmModal
          forwardKeys={confirmModal.forwardKeys}
          backwardKeys={confirmModal.backwardKeys}
          worker={confirmModal.formData.worker}
          otherWorker={confirmModal.otherWorker}
          loading={filling}
          onBack={() => setConfirmModal(null)}
          onSingleOnly={handleConfirmSingleOnly}
          onAutoFill={handleConfirmAutoFill}
        />
      )}

      <div style={{textAlign:'center',padding:'24px 0',color:'#9ca3af',fontSize:12}}>
        주문도 교대관리 v2.1 · Supabase 실시간 동기화
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
