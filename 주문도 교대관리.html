<!DOCTYPE html>

<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>주문도 교대관리</title>
  <script src="./주문도 교대관리_files/react.production.min.js.다운로드"></script>
  <script src="./주문도 교대관리_files/react-dom.production.min.js.다운로드"></script>
  <script src="./주문도 교대관리_files/babel.min.js.다운로드"></script>
  <script src="./주문도 교대관리_files/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; min-height: 100vh; }

    /* ── 로그인 ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#667eea,#764ba2); padding: 16px; }
    .login-card { background: #fff; border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .login-icon { font-size: 52px; text-align: center; margin-bottom: 12px; }
    .login-title { font-size: 22px; font-weight: 700; text-align: center; color: #1f2937; }
    .login-sub { font-size: 13px; color: #9ca3af; text-align: center; margin-top: 4px; margin-bottom: 24px; }
    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .user-btn { padding: 16px 8px; border-radius: 12px; border: 2px solid #e5e7eb; background: #fff; cursor: pointer; transition: all .2s; text-align: center; }
    .user-btn:hover { border-color: #c4b5fd; }
    .user-btn.sel-a { border-color: #7c3aed; background: #faf5ff; }
    .user-btn.sel-b { border-color: #db2777; background: #fdf2f8; }
    .user-btn .u-icon { font-size: 28px; margin-bottom: 4px; }
    .user-btn .u-name { font-weight: 600; font-size: 15px; color: #374151; }
    .pin-label { font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 10px; }
    .pin-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
    .pin-box { width: 52px; height: 52px; font-size: 22px; text-align: center; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; transition: border .2s; }
    .pin-box:focus { border-color: #7c3aed; }
    .pin-err { color: #ef4444; font-size: 13px; text-align: center; min-height: 20px; margin-bottom: 8px; }
    .pin-hint { font-size: 12px; color: #9ca3af; text-align: center; }

    /* ── 비밀번호 변경 ── */
    .change-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#667eea,#764ba2); padding: 16px; }
    .change-card { background: #fff; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .change-title { font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
    .change-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; outline: none; }
    .input-group input:focus { border-color: #7c3aed; }
    .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── 헤더 ── */
    .header { background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff; padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-user { font-size: 13px; opacity: .85; }
    .logout-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }

    /* ── 메인 ── */
    .main { max-width: 900px; margin: 0 auto; padding: 16px; }

    /* ── 통계 ── */
    .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
    @media(min-width:600px){ .stats-grid { grid-template-columns: repeat(4,1fr); } }
    .stat-card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .stat-label { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 700; }
    .c-purple { color: #7c3aed; }
    .c-blue   { color: #2563eb; }
    .c-green  { color: #059669; }
    .c-orange { color: #ea580c; }

    /* ── 교대 알림 ── */
    .alert-card { background: linear-gradient(135deg,#fbbf24,#f97316); border-radius: 14px; padding: 18px; margin-bottom: 16px; display: flex; gap: 14px; align-items: flex-start; }
    .alert-icon { font-size: 32px; line-height: 1; }
    .alert-title { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
    .alert-info { font-size: 14px; color: #1f2937; line-height: 1.8; }

    /* ── 탭 ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .tab-btn { flex-shrink: 0; padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .tab-btn.active { background: #7c3aed; color: #fff; }
    .tab-btn.inactive { background: #fff; color: #6b7280; }

    /* ── 캘린더 ── */
    .cal-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav-btn { background: #f3f4f6; border: none; border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cal-nav-btn:hover { background: #e5e7eb; }
    .cal-title { font-size: 18px; font-weight: 700; color: #1f2937; }
    .cal-legend { display: flex; gap: 8px; flex-wrap: wrap; }
    .legend-chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .legend-hj { background: #ede9fe; color: #6d28d9; }
    .legend-ms { background: #fce7f3; color: #be185d; }
    .legend-today-chip { background: #d1fae5; color: #065f46; }

    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-dow { text-align: center; font-size: 12px; font-weight: 700; color: #6b7280; padding: 8px 0; }
    .cal-dow.sun { color: #ef4444; }
    .cal-dow.sat { color: #3b82f6; }

    .cal-cell { min-height: 78px; border-radius: 8px; padding: 5px; cursor: pointer; border: 2px solid transparent; position: relative; transition: all .15s; }
    .cal-cell:hover { opacity: .85; filter: brightness(1.05); }
    .cal-cell.empty { background: #f9fafb; cursor: default; }
    .cal-cell.empty:hover { opacity: 1; filter: none; }
    .cal-cell.hj { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
    .cal-cell.ms { background: linear-gradient(135deg,#f093fb,#f5576c); color: #fff; }
    .cal-cell.unset { background: #f3f4f6; color: #9ca3af; border: 2px dashed #d1d5db; }
    .cal-cell.is-today { border-color: #10b981 !important; box-shadow: 0 0 0 2px #10b98140; }
    .cal-cell.is-handover { border-color: #fbbf24 !important; box-shadow: 0 0 0 2px #fbbf2440; }

    .cell-date { font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .cell-holiday { font-size: 10px; background: #ef4444; color: #fff; border-radius: 4px; padding: 1px 4px; margin-bottom: 2px; display: inline-block; }
    .cell-handover { font-size: 10px; background: #fbbf24; color: #1f2937; border-radius: 4px; padding: 1px 4px; margin-bottom: 2px; display: inline-block; font-weight: 700; }
    .cell-worker { font-size: 11px; font-weight: 600; margin-top: 2px; }
    .cell-edit-hint { font-size: 9px; opacity: .7; margin-top: 2px; }

    /* ── 팝업 ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .modal-title { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 16px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
    .seg-btns { display: flex; gap: 8px; }
    .seg-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #e5e7eb; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
    .seg-btn.active-hj { border-color: #7c3aed; background: #faf5ff; color: #7c3aed; }
    .seg-btn.active-ms { border-color: #db2777; background: #fdf2f8; color: #db2777; }
    .seg-btn.active-yes { border-color: #fbbf24; background: #fffbeb; color: #92400e; }
    .seg-btn.active-no  { border-color: #e5e7eb; background: #f9fafb; color: #6b7280; }
    .modal-select { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .modal-select:focus { border-color: #7c3aed; }
    .modal-input { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .modal-input:focus { border-color: #7c3aed; }
    .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
    .modal-save { flex: 1; padding: 11px; background: linear-gradient(135deg,#7c3aed,#db2777); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .modal-cancel { flex: 1; padding: 11px; background: #f3f4f6; color: #6b7280; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .modal-delete { width: 100%; padding: 10px; background: #fee2e2; color: #ef4444; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }

    /* ── 공정성 ── */
    .fair-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .fair-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 16px; }
    .fair-row { margin-bottom: 16px; }
    .fair-row-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .fair-row-label { color: #6b7280; }
    .fair-ok  { color: #059669; font-weight: 600; }
    .fair-warn{ color: #ea580c; font-weight: 600; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .bar-name { width: 36px; font-size: 13px; color: #374151; }
    .bar-bg { flex: 1; background: #f3f4f6; border-radius: 99px; height: 22px; overflow: hidden; }
    .bar-fill { height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; font-weight: 700; color: #fff; border-radius: 99px; min-width: 32px; }
    .bar-hj { background: linear-gradient(90deg,#7c3aed,#a78bfa); }
    .bar-ms { background: linear-gradient(90deg,#db2777,#f472b6); }
    .fair-note { font-size: 11px; color: #9ca3af; margin-top: 2px; }
    .score-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .score-num { font-size: 32px; font-weight: 700; color: #1f2937; }
    .score-bar-bg { background: #f3f4f6; border-radius: 99px; height: 14px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
    .score-excellent { background: linear-gradient(90deg,#059669,#34d399); }
    .score-good      { background: linear-gradient(90deg,#d97706,#fbbf24); }
    .score-poor      { background: linear-gradient(90deg,#dc2626,#f87171); }
    .score-desc { font-size: 12px; color: #6b7280; margin-top: 6px; }

    /* ── 기상 ── */
    .weather-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .weather-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 14px; }
    .weather-iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; }
    .weather-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 14px; }
    .w-stat { border-radius: 10px; padding: 12px; text-align: center; }
    .w-stat-label { font-size: 12px; color: #6b7280; }
    .w-stat-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .w-temp { background: #dbeafe; } .w-temp .w-stat-val { color: #1d4ed8; }
    .w-wind { background: #d1fae5; } .w-wind .w-stat-val { color: #065f46; }
    .w-wave { background: #ede9fe; } .w-wave .w-stat-val { color: #6d28d9; }
    .weather-ok { margin-top: 12px; background: #d1fae5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #065f46; font-weight: 600; }

    /* ── 로딩 ── */
    .loading-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #7c3aed; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; color: #6b7280; }

    /* ── 희망일 ── */
    .wish-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .wish-title { font-size: 16px; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
    .wish-sub { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    .wish-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 16px; }
    .wish-day-btn { padding: 8px 4px; border-radius: 8px; border: 2px solid #e5e7eb; background: #fff; cursor: pointer; text-align: center; transition: all .2s; }
    .wish-day-btn.weekend { background: #f9fafb; }
    .wish-day-btn.selected { border-color: #059669; background: #d1fae5; font-weight: 700; }
    .wish-day-label { font-size: 9px; color: #9ca3af; }
    .wish-day-num { font-size: 13px; font-weight: 600; }
    .wish-summary { background: #d1fae5; border-radius: 10px; padding: 12px 16px; margin-bottom: 14px; }
    .wish-summary-text { font-size: 13px; font-weight: 600; color: #065f46; }
    .wish-summary-sub { font-size: 11px; color: #059669; margin-top: 2px; }

    /* ── 반응형 ── */
    @media(max-width:480px){
      .cal-cell { min-height: 64px; padding: 3px; }
      .cell-date { font-size: 11px; }
      .cell-worker { font-size: 10px; }
      .cell-handover,.cell-holiday { font-size: 9px; }
    }
  </style>

    const entered = p.join('');
    const { data } = await supabase.from('users').select('pin,is_first_login').eq('username', user).single();
    if (!data) { setErr('사용자 정보 없음'); setPin(['','','','']); return; }
    if (data.pin !== entered) { setErr('PIN이 틀렸습니다'); setPin(['','','','']); document.getElementById('p0')?.focus(); return; }
    onLogin(user, data.is_first_login);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-icon">🏝️</div>
        <h1 className="login-title">주문도 교대관리</h1>

        <div className="user-grid">
          {['효중','민수'].map(u => (
            <button key={u} className={`user-btn ${user===u ? (u==='효중'?'sel-a':'sel-b') : ''}`} onClick={()=>{ setUser(u); setPin(['','','','']); setErr(''); }}>
              <div className="u-icon">{u==='효중'?'👨':'👨‍💼'}</div>
              <div className="u-name">{u}</div>
            </button>
          ))}
        </div>

        <p className="pin-label">PIN 입력</p>
        <div className="pin-row">
          {pin.map((d,i) => (
            <input key={i} id={`p${i}`} type="password" maxLength={1} value={d}
              className="pin-box" autoFocus={i===0}
              onChange={e => handlePin(i, e.target.value)} />
          ))}
        </div>
        <p className="pin-err">{err}</p>
        <p className="pin-hint">초기 PIN: 0000</p>
      </div>
    </div>
  );
}

// ── 비밀번호 변경 ──
function ChangePinScreen({ username, onDone }) {
  const [n1, setN1] = useState('');
  const [n2, setN2] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (n1.length < 4) { setErr('4자리 이상 입력하세요'); return; }
    if (n1 !== n2) { setErr('PIN이 일치하지 않습니다'); return; }
    if (n1 === '0000') { setErr('0000은 사용할 수 없습니다'); return; }
    setLoading(true);
    await supabase.from('users').update({ pin: n1, is_first_login: false }).eq('username', username);
    setLoading(false);
    onDone();
  };

  return (
    <div className="change-wrap">
      <div className="change-card">
        <div style={{fontSize:40,marginBottom:12}}>🔐</div>
        <h2 className="change-title">PIN 변경</h2>
        <p className="change-sub">{username}님, 초기 PIN을 변경해주세요.</p>
        <div className="input-group">
          <label>새 PIN (숫자 4자리 이상)</label>
          <input type="password" value={n1} onChange={e=>setN1(e.target.value)} placeholder="새 PIN 입력" className="modal-input" />
        </div>
        <div className="input-group">
          <label>PIN 확인</label>
          <input type="password" value={n2} onChange={e=>setN2(e.target.value)} placeholder="PIN 재입력" className="modal-input" />
        </div>
        {err && <p style={{color:'#ef4444',fontSize:13,marginBottom:12}}>{err}</p>}
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? '저장 중...' : '변경하기'}
        </button>
      </div>
    </div>
  );
}

// ── 캘린더 ──
function CalendarView({ scheduleMap, currentUser, year, month, onCellClick }) {
  const todayKey = today();
  const firstDow = new Date(year, month, 1).getDay();
  const totalDays = daysInMonth(year, month);
  const cells = [];

  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);

  return (
    <div className="cal-card">
      <div className="cal-nav" style={{flexWrap:'wrap',gap:8}}>
        <div className="cal-title">{year}년 {month+1}월</div>
        <div className="cal-legend">
          <span className="legend-chip legend-hj">👨 효중</span>
          <span className="legend-chip legend-ms">👨‍💼 민수</span>
          <span className="legend-chip legend-today-chip">📍 오늘</span>
        </div>
      </div>

      <div className="cal-grid">
        {DOW.map((d,i) => (
          <div key={d} className={`cal-dow ${i===0?'sun':i===6?'sat':''}`}>{d}</div>
        ))}
        {cells.map((d,i) => {
          if (!d) return <div key={`e${i}`} className="cal-cell empty" />;
          const key = toKey(year, month, d);
          const sc = scheduleMap[key];
          const isToday = key === todayKey;
          const dow = new Date(year, month, d).getDay();
          const isSun = dow === 0, isSat = dow === 6;

          let cls = 'cal-cell ';
          if (!sc) cls += 'unset';
          else if (sc.worker === '효중') cls += 'hj';
          else cls += 'ms';
          if (isToday) cls += ' is-today';
          if (sc?.is_handover) cls += ' is-handover';

          return (
            <div key={key} className={cls} onClick={() => onCellClick(key, sc)}>
              <div className="cell-date">
                <span style={{color: sc ? '#fff' : isSun ? '#ef4444' : isSat ? '#93c5fd' : ''}}>{d}</span>
                {isToday && <span style={{fontSize:10}}>📍</span>}
              </div>
              {sc?.is_holiday && <div className="cell-holiday">{sc.holiday_name || '공휴일'}</div>}
              {sc?.is_handover && <div className="cell-handover">🔄 {sc.handover_time?.split(' ')[0]}</div>}
              {sc && <div className="cell-worker">{sc.worker === '효중' ? '👨 효중' : '👨‍💼 민수'}</div>}
              {!sc && <div className="cell-edit-hint">탭하여 입력</div>}
            </div>
          );
        })}
      </div>

      <div style={{marginTop:12,display:'flex',gap:12,fontSize:12,color:'#9ca3af',flexWrap:'wrap'}}>
        <span>🟡 테두리 = 교대일</span>
        <span>🟢 테두리 = 오늘</span>
        <span>탭하면 입력/수정</span>
      </div>
    </div>
  );
}

// ── 통계 카드 ──
function StatsCards({ scheduleMap, currentUser, year, month }) {
  const keys = Object.keys(scheduleMap).filter(k => k.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  const myDays = keys.filter(k => scheduleMap[k].worker === currentUser).length;
  const restDays = daysInMonth(year, month) - myDays;
  const nextHandover = Object.entries(scheduleMap)
    .filter(([k,v]) => k >= today() && v.is_handover)
    .sort(([a],[b]) => a.localeCompare(b))[0];

  const [y,m,d] = nextHandover ? nextHandover[0].split('-') : [];
  const nextLabel = nextHandover ? `${parseInt(m)}/${parseInt(d)} ${nextHandover[1].handover_time?.split(' ')[0]}` : '-';

  return (
    <div className="stats-grid">
      <div className="stat-card">
        <div className="stat-label">근무일수 ({month+1}월)</div>
        <div className="stat-val c-purple">{myDays}일</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">실근무시간</div>
        <div className="stat-val c-blue">{myDays*24}시간</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">휴식일수</div>
        <div className="stat-val c-green">{restDays}일</div>
      </div>
      <div className="stat-card">
        <div className="stat-label">다음 교대</div>
        <div className="stat-val c-orange" style={{fontSize:16}}>{nextLabel}</div>
      </div>
    </div>
  );
}

// ── 교대 알림 ──
function HandoverAlert({ scheduleMap, currentUser }) {
  const todayKey = today();
  const [ty, tm, td] = todayKey.split('-').map(Number);
  const tomorrowKey = toKey(ty, tm-1, td+1);
  const tmSc = scheduleMap[tomorrowKey];
  const todSc = scheduleMap[todayKey];

  if (!tmSc?.is_handover) return null;
  const isMyTurn = todSc?.worker === currentUser || tmSc?.worker === currentUser;
  if (!isMyTurn) return null;

  const [,m,d] = tomorrowKey.split('-');
  return (
    <div className="alert-card">
      <div className="alert-icon">⚠️</div>
      <div>
        <div className="alert-title">내일 교대일입니다!</div>
        <div className="alert-info">
          📅 {parseInt(m)}월 {parseInt(d)}일<br/>
          🚢 {tmSc.handover_time}<br/>
          🔄 {todSc?.worker} → {tmSc.worker}<br/>
          ⏰ 출발 시간 꼭 확인!
        </div>
      </div>
    </div>
  );
}

// ── 공정성 ──
function FairnessReport({ scheduleMap }) {
  const all = Object.values(scheduleMap);
  const hjDays = all.filter(s=>s.worker==='효중').length;
  const msDays = all.filter(s=>s.worker==='민수').length;
  const total = hjDays + msDays || 1;

  const hjWknd = all.filter(s=>{ const dow=new Date(Object.keys(scheduleMap).find(k=>scheduleMap[k]===s)).getDay(); return s.worker==='효중'&&(dow===0||dow===6); }).length;
  const msWknd = all.filter(s=>{ const dow=new Date(Object.keys(scheduleMap).find(k=>scheduleMap[k]===s)).getDay(); return s.worker==='민수'&&(dow===0||dow===6); }).length;

  const diff = Math.abs(hjDays-msDays);
  const wDiff = Math.abs(hjWknd-msWknd);
  const dScore = Math.max(0,(3-diff)/3*40);
  const wScore = Math.max(0,(2-wDiff)/2*30);
  const score = Math.round(dScore+wScore+30);

  return (
    <div className="fair-card">
      <div className="fair-title">⚖️ 누적 공정성 리포트</div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">📈 근무일수 균형</span>
          <span className={diff<=3?'fair-ok':'fair-warn'}>{diff<=3?'✅ 균형':'⚠️ 조정필요'}</span>
        </div>
        {[['효중',hjDays,'bar-hj'],['민수',msDays,'bar-ms']].map(([n,v,cls])=>(
          <div key={n} className="bar-wrap">
            <span className="bar-name">{n}</span>
            <div className="bar-bg">
              <div className={`bar-fill ${cls}`} style={{width:`${(v/Math.max(hjDays,msDays,1))*100}%`}}>{v}일</div>
            </div>
          </div>
        ))}
        <p className="fair-note">차이 {diff}일 (목표: 3일 이내)</p>
      </div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">🌅 주말 근무</span>
          <span className={wDiff<=2?'fair-ok':'fair-warn'}>{wDiff<=2?'✅ 균형':'⚠️ 주의'}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['효중',hjWknd,'#ede9fe','#6d28d9'],['민수',msWknd,'#fce7f3','#be185d']].map(([n,v,bg,c])=>(
            <div key={n} style={{background:bg,borderRadius:8,padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:12,color:'#6b7280'}}>{n}</div>
              <div style={{fontSize:22,fontWeight:700,color:c}}>{v}일</div>
            </div>
          ))}
        </div>
      </div>

      <div className="fair-row">
        <div className="fair-row-header">
          <span className="fair-row-label">🎯 종합 공정성 점수</span>
        </div>
        <div className="score-wrap">
          <span className="score-num">{score}/100</span>
          <span style={{fontSize:28}}>{score>=90?'🏆':score>=70?'👍':'⚠️'}</span>
        </div>
        <div className="score-bar-bg">
          <div className={`score-bar-fill ${score>=90?'score-excellent':score>=70?'score-good':'score-poor'}`} style={{width:`${score}%`}} />
        </div>
        <p className="score-desc">{score>=90?'✅ 매우 공정':score>=70?'👍 양호':' ⚠️ 다음 달 조정 필요'}</p>
      </div>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [state, setState] = useState('loading'); // loading | login | changePin | dashboard
  const [currentUser, setCurrentUser] = useState(null);
  const [scheduleMap, setScheduleMap] = useState({});
  const [tab, setTab] = useState('calendar');
  const [calYear, setCalYear] = useState(new Date().getFullYear());
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [modal, setModal] = useState(null); // { dateKey, existing }

  // 초기 로드
  useEffect(() => {
    const init = async () => {
      // 테이블 없으면 초기화
      const { error } = await supabase.from('users').select('username').limit(1);
      if (error) { setState('login'); return; }
      setState('login');
    };
    init();
  }, []);

  // 스케줄 로드
  const loadSchedule = useCallback(async () => {
    const { data } = await supabase.from('schedule').select('*');
    if (!data) return;
    const map = {};
    data.forEach(r => { map[r.date] = r; });
    setScheduleMap(map);
  }, []);

  // 실시간 구독
  useEffect(() => {
    if (state !== 'dashboard') return;
    loadSchedule();
    const channel = supabase.channel('schedule-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'schedule' }, () => loadSchedule())
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, [state, loadSchedule]);

  const handleLogin = (user, isFirst) => {
    setCurrentUser(user);
    if (isFirst) setState('changePin');
    else setState('dashboard');
  };

  const handlePinChanged = () => setState('dashboard');

  // 셀 클릭
  const handleCellClick = (dateKey, existing) => {
    setModal({ dateKey, existing });
  };

  // 저장
  const handleSave = async (dateKey, data) => {
    const existing = scheduleMap[dateKey];
    if (existing) {
      await supabase.from('schedule').update({ ...data, updated_at: new Date().toISOString() }).eq('date', dateKey);
    } else {
      await supabase.from('schedule').insert({ date: dateKey, ...data });
    }
    setModal(null);
    loadSchedule();
  };

  // 삭제
  const handleDelete = async (dateKey) => {
    await supabase.from('schedule').delete().eq('date', dateKey);
    setModal(null);
    loadSchedule();
  };

  // 월 이동
  const prevMonth = () => {
    if (calMonth === 0) { setCalYear(y=>y-1); setCalMonth(11); }
    else setCalMonth(m=>m-1);
  };
  const nextMonth = () => {
    if (calMonth === 11) { setCalYear(y=>y+1); setCalMonth(0); }
    else setCalMonth(m=>m+1);
  };

  if (state === 'loading') return <LoadingScreen />;
  if (state === 'login') return <LoginScreen onLogin={handleLogin} />;
  if (state === 'changePin') return <ChangePinScreen username={currentUser} onDone={handlePinChanged} />;

  return (
    <div>
      {/* 헤더 */}
      <div className="header">
        <div className="header-inner">
          <div>
            <div className="header-title">🏝️ 주문도 교대관리</div>
            <div className="header-user">{currentUser}님</div>
          </div>
          <button className="logout-btn" onClick={()=>{ setCurrentUser(null); setState('login'); }}>로그아웃</button>
        </div>
      </div>

      <div className="main">
        {/* 통계 */}
        <StatsCards scheduleMap={scheduleMap} currentUser={currentUser} year={calYear} month={calMonth} />

        {/* 교대 알림 */}
        <HandoverAlert scheduleMap={scheduleMap} currentUser={currentUser} />

        {/* 탭 */}
        <div className="tabs">
          {[['calendar','📅 스케줄'],['wish','💚 희망일'],['fairness','⚖️ 공정성'],['weather','🌊 기상']].map(([k,l])=>(
            <button key={k} className={`tab-btn ${tab===k?'active':'inactive'}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {/* 캘린더 탭 */}
        {tab === 'calendar' && (
          <>
            {/* 월 네비게이션 */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:12}}>
              <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
              <span style={{fontSize:16,fontWeight:700,color:'#1f2937',minWidth:80,textAlign:'center'}}>{calYear}년 {calMonth+1}월</span>
              <button className="cal-nav-btn" onClick={nextMonth}>›</button>
            </div>
            <CalendarView
              scheduleMap={scheduleMap}
              currentUser={currentUser}
              year={calYear}
              month={calMonth}
              onCellClick={handleCellClick}
            />
          </>
        )}

        {tab === 'wish' && <WishForm currentUser={currentUser} />}
        {tab === 'fairness' && <FairnessReport scheduleMap={scheduleMap} />}
        {tab === 'weather' && <WeatherView />}
      </div>

      {/* 날짜 편집 모달 */}
      {modal && (
        <DayModal
          dateKey={modal.dateKey}
          existing={modal.existing}
          onSave={data => handleSave(modal.dateKey, data)}
          onDelete={() => handleDelete(modal.dateKey)}
          onClose={() => setModal(null)}
        />
      )}

      <div style={{textAlign:'center',padding:'24px 0',color:'#9ca3af',fontSize:12}}>
        주문도 교대관리 v2.0 · Supabase 실시간 동기화
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>


</body></html>
